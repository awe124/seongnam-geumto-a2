<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>성남금토 A-2블록 국민임대주택</title>
  <meta name="description" content="성남금토 A-2블록 국민임대주택 안내 랜딩페이지. 총 438세대, 판교와 붙은 자리, 강남과 같은 생활." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="성남금토 A-2블록 국민임대주택" />
  <meta property="og:description" content="판교와 붙은 자리, 강남과 같은 생활. 성남금토 A-2블록 국민임대주택 안내." />
  <meta property="og:image" content="assets/landing.jpg" />
  <meta name="theme-color" content="#009967" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar" aria-label="빠른 이동 메뉴">
    <a class="brand" href="#top" aria-label="성남금토 A-2블록 상단으로 이동">
      <span class="brand-mark">LH</span>
      <span>성남금토 A-2블록</span>
    </a>

    <nav class="quick-nav" aria-label="주요 링크">
      <a href="https://www.lh.or.kr" target="_blank" rel="noopener">LH 홈페이지</a>
      <a href="https://apply.lh.or.kr" target="_blank" rel="noopener">LH 청약플러스</a>
    </nav>
  </header>

  <main id="top" class="page">
    <section class="visual" aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">성남금토 A-2블록 국민임대주택 안내</h1>
      <img
        class="landing-image"
        src="assets/landing.jpg"
        alt="성남금토 A-2블록 국민임대주택 안내 이미지. 총 438세대, 판교와 붙은 자리, 강남과 같은 생활."
      />
    </section>
  </main>

  <div class="floating-cta" aria-label="고정 바로가기 버튼">
    <a class="cta cta-apply" href="https://apply.lh.or.kr" target="_blank" rel="noopener">
      청약플러스 바로가기
    </a>
  </div>

  <button class="to-top" type="button" aria-label="상단으로 이동">↑</button>

  <script>
    const topButton = document.querySelector('.to-top');

    const onScroll = () => {
      topButton.classList.toggle('is-visible', window.scrollY > 500);
    };

    window.addEventListener('scroll', onScroll, { passive: true });

    topButton.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
